name: macOS Test Build

on:
  workflow_dispatch:
  push:
    tags:
      - "test-build-*"

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            label: Apple Silicon
            archive: D100-DungeonScribe-macOS-Apple-Silicon
          - runner: macos-15-intel
            label: Intel
            archive: D100-DungeonScribe-macOS-Intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scan source for secrets
        run: npm run security:scan

      - name: Generate Prisma client
        env:
          DATABASE_URL: file:${{ runner.temp }}/build.db
        run: npm run db:generate

      - name: Build standalone application
        env:
          DATABASE_URL: file:${{ runner.temp }}/build.db
        run: npm run build

      - name: Assemble self-contained test package
        env:
          ARCHIVE_NAME: ${{ matrix.archive }}
        run: |
          BUNDLE_ROOT="$RUNNER_TEMP/$ARCHIVE_NAME"
          mkdir -p "$BUNDLE_ROOT/.next" "$BUNDLE_ROOT/runtime"
          cp -R .next/standalone/. "$BUNDLE_ROOT/"
          cp -R .next/static "$BUNDLE_ROOT/.next/static"
          cp -R prisma "$BUNDLE_ROOT/prisma"
          cp scripts/macos/migrate.mjs "$BUNDLE_ROOT/migrate.mjs"
          cp scripts/macos/Start.command "$BUNDLE_ROOT/Start.command"
          cp scripts/macos/README.txt "$BUNDLE_ROOT/README.txt"

          NODE_BINARY="$(command -v node)"
          NODE_ROOT="$(cd "$(dirname "$NODE_BINARY")/.." && pwd)"
          cp "$NODE_BINARY" "$BUNDLE_ROOT/runtime/node"
          cp "$NODE_ROOT/LICENSE" "$BUNDLE_ROOT/runtime/NODE-LICENSE.txt"
          chmod 755 "$BUNDLE_ROOT/runtime/node" "$BUNDLE_ROOT/Start.command"

          while IFS= read -r -d '' NATIVE_MODULE; do
            codesign --force --sign - --timestamp=none "$NATIVE_MODULE"
            codesign --verify --strict "$NATIVE_MODULE"
          done < <(find "$BUNDLE_ROOT" -type f -name "*.node" -print0)

      - name: Install browser for packaged persistence test
        if: matrix.label == 'Apple Silicon'
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/playwright-browsers
        run: npx playwright install chromium

      - name: Smoke-test packaged application
        env:
          ARCHIVE_NAME: ${{ matrix.archive }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/playwright-browsers
          RUN_BROWSER_TEST: ${{ matrix.label == 'Apple Silicon' }}
        run: |
          BUNDLE_ROOT="$RUNNER_TEMP/$ARCHIVE_NAME"
          TEST_HOME="$RUNNER_TEMP/package-smoke-home"
          NATIVE_MODULE="$(find "$BUNDLE_ROOT" -type f -name "better_sqlite3.node" -print -quit)"
          mkdir -p "$TEST_HOME"

          test -n "$NATIVE_MODULE"
          xattr -w com.apple.quarantine "0081;00000000;GitHub Actions;" "$NATIVE_MODULE"

          export HOME="$TEST_HOME"
          export DUNGEONSCRIBE_NO_OPEN="1"
          export PORT="3210"

          "$BUNDLE_ROOT/Start.command" >"$RUNNER_TEMP/package-server.log" 2>&1 &
          START_PID=$!
          trap 'kill "$START_PID" 2>/dev/null || true' EXIT

          READY="0"
          for attempt in {1..40}; do
            if curl --silent --fail "http://127.0.0.1:3210" >/dev/null; then
              READY="1"
              break
            fi
            if ! kill -0 "$START_PID" 2>/dev/null; then
              cat "$RUNNER_TEMP/package-server.log"
              exit 1
            fi
            sleep 0.5
          done

          if [[ "$READY" != "1" ]]; then
            cat "$RUNNER_TEMP/package-server.log"
            exit 1
          fi

          if xattr -p com.apple.quarantine "$NATIVE_MODULE" >/dev/null 2>&1; then
            echo "Start.command did not remove the quarantine attribute."
            exit 1
          fi

          if [[ "$RUN_BROWSER_TEST" == "true" ]]; then
            if ! PLAYWRIGHT_BASE_URL="http://127.0.0.1:3210" \
              npx playwright test e2e/campaigns.spec.ts --project=chromium --retries=0; then
              cat "$RUNNER_TEMP/package-server.log"
              exit 1
            fi

            TEST_DATABASE="$TEST_HOME/Library/Application Support/D100 DungeonScribe/dungeonscribe.db"
            CAMPAIGN_COUNT="$(sqlite3 "$TEST_DATABASE" 'SELECT COUNT(*) FROM Campaign;')"
            CHARACTER_COUNT="$(sqlite3 "$TEST_DATABASE" 'SELECT COUNT(*) FROM Character;')"
            ENTITY_COUNT="$(sqlite3 "$TEST_DATABASE" 'SELECT COUNT(*) FROM WorldEntity;')"
            RELATION_COUNT="$(sqlite3 "$TEST_DATABASE" 'SELECT COUNT(*) FROM WorldEntityRelation;')"
            EVENT_COUNT="$(sqlite3 "$TEST_DATABASE" 'SELECT COUNT(*) FROM CampaignEvent;')"
            test "$CAMPAIGN_COUNT" = "1"
            test "$CHARACTER_COUNT" = "1"
            test "$ENTITY_COUNT" = "2"
            test "$RELATION_COUNT" = "1"
            test "$EVENT_COUNT" = "9"
          fi

      - name: Create archive and checksum
        env:
          ARCHIVE_NAME: ${{ matrix.archive }}
        run: |
          mkdir -p dist
          COPYFILE_DISABLE=1 tar -C "$RUNNER_TEMP" -czf "dist/$ARCHIVE_NAME.tar.gz" "$ARCHIVE_NAME"
          cd dist
          shasum -a 256 "$ARCHIVE_NAME.tar.gz" >"$ARCHIVE_NAME.tar.gz.sha256"

      - name: Upload macOS test package
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.archive }}
          path: |
            dist/${{ matrix.archive }}.tar.gz
            dist/${{ matrix.archive }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
