name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: file:./prisma/ci.db
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Tests, types, lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scan tracked files for secrets
        run: npm run security:scan

      - name: Check production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply test database migrations
        run: npm run db:migrate

      - name: Run unit and integration tests
        run: npm run test

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Run lint checks
        run: npm run lint

      - name: Build production application
        run: npm run build

  end-to-end:
    name: Browser smoke test
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply browser test database migrations
        run: npm run db:migrate

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke test
        run: npm run test:e2e

      - name: Upload failure report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
